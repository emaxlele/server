name: Sync upstream

on:
  schedule:
    - cron: '0 6 */13 * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "emaxlele"
          git config user.email "emaxlele.lavoro@gmail.com"

      - name: Sync from upstream
        run: |
          UPSTREAM=$(gh api /repos/${{ github.repository }} --jq '.parent.full_name')
          git remote add upstream "https://github.com/${UPSTREAM}.git"
          git fetch upstream
          DEFAULT_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}')
          git checkout "${DEFAULT_BRANCH}"
          git merge "upstream/${DEFAULT_BRANCH}" --ff-only
          git push origin "${DEFAULT_BRANCH}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
